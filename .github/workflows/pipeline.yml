name: Immutable Infrastructure Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'packer/**'
      - 'ansible/**'
      - 'validation/**'
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-image:
    name: Bake Hardened Image
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.extract-image.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP as Packer SA
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PACKER_SA }}

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.11.0"

      - name: Set up Python and Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Packer init
        run: packer init packer/

      - name: Packer validate
        run: |
          packer validate \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            packer/

      - name: Packer build
        run: |
          packer build \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            packer/

      - name: Extract image artifact ID
        id: extract-image
        run: |
          IMAGE_NAME=$(python3 -c "
          import json
          with open('packer/manifest.json') as f:
              m = json.load(f)
          last_uuid = m['last_run_uuid']
          build = next(b for b in m['builds'] if b['packer_run_uuid'] == last_uuid)
          print(build['artifact_id'])
          ")
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Built image: ${IMAGE_NAME}"

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-image
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP as Terraform SA
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: OpenTofu init
        working-directory: terraform
        run: tofu init

      - name: OpenTofu validate
        working-directory: terraform
        run: tofu validate

      - name: OpenTofu plan
        working-directory: terraform
        run: |
          tofu plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image_name=${{ needs.build-image.outputs.image_name }}" \
            -var="sa_instance_runtime_email=sa-compute-instance@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            -out="tfplan"

      - name: OpenTofu apply
        working-directory: terraform
        run: tofu apply "tfplan"

      - name: Verify load balancer response
        working-directory: terraform
        run: |
          LB_IP=$(tofu output -raw load_balancer_ip)
          echo "Load balancer IP: ${LB_IP}"
          
          # Wait for LB to be ready with retries
          MAX_ATTEMPTS=20
          ATTEMPT=0
          until [ $ATTEMPT -ge $MAX_ATTEMPTS ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              http://${LB_IP}/ || echo "000")
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Load balancer returning HTTP 200"
              curl -s http://${LB_IP}/
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: HTTP ${HTTP_CODE} — waiting 30s"
            sleep 30
          done
          echo "Load balancer did not return 200 after ${MAX_ATTEMPTS} attempts"
          exit 1
